<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fórmula Game | Arena Mobile</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle at center, #111, var(--dark));
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Trava o scroll */
        }

        /* --- LOBBY --- */
        #lobby {
            position: fixed;
            inset: 0;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .card-login {
            background: var(--glass);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            text-align: center;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.5);
            color: white;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
        }

        /* --- ARENA --- */
        .arena {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
            height: 95vh; /* Ocupa quase toda a altura */
            padding: 15px;
            justify-content: space-between; /* Espaçamento inteligente */
            align-items: center;
        }

        .header-duel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: var(--glass);
            padding: 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .p-box {
            text-align: center;
            flex: 1;
            padding: 8px;
            border-radius: 12px;
            transition: 0.4s;
        }

        .p-box.active {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .p-name { font-weight: bold; font-size: 0.85rem; text-transform: uppercase; color: #fff; margin-top: 3px; }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            aspect-ratio: 1/1; /* Garante o quadrado perfeito */
            padding: 5px;
        }

        .cell {
            background: var(--glass);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(2.5rem, 12vw, 3.5rem);
            font-weight: 900;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }

        .cell.x { color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        .cell.o { color: #fff; text-shadow: 0 0 15px #fff; }

        .status { 
            font-size: 1.1rem; 
            font-weight: bold; 
            color: var(--gold); 
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            text-align: center;
        }

        .btn-gold {
            background: var(--gold);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #reset {
            background: transparent;
            color: var(--gold);
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 8px 20px;
            width: auto;
            font-size: 0.7rem;
            border-radius: 50px;
        }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="card-login">
            <h2 style="color:var(--gold); letter-spacing: 2px;">FÓRMULA GAME</h2>
            <input type="text" id="username" placeholder="Seu Nome">
            <button class="btn-gold" id="startBtn">Entrar na Arena</button>
        </div>
    </div>

    <div class="arena" id="arena">
        <div class="header-duel">
            <div class="p-box" id="cardX">
                <small style="color: var(--gold);">PLAYER X</small>
                <div class="p-name" id="nameX">---</div>
            </div>
            <div style="font-weight:bold; color:var(--gold); padding: 0 10px; font-style: italic;">VS</div>
            <div class="p-box" id="cardO">
                <small style="color: white;">PLAYER O</small>
                <div class="p-name" id="nameO">---</div>
            </div>
        </div>

        <div class="status" id="statusTxt">Carregando...</div>

        <div class="board" id="board">
            <div class="cell" data-i="0"></div>
            <div class="cell" data-i="1"></div>
            <div class="cell" data-i="2"></div>
            <div class="cell" data-i="3"></div>
            <div class="cell" data-i="4"></div>
            <div class="cell" data-i="5"></div>
            <div class="cell" data-i="6"></div>
            <div class="cell" data-i="7"></div>
            <div class="cell" data-i="8"></div>
        </div>

        <div style="width: 100%; text-align: center;">
            <button id="reset">Resetar Tabuleiro</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmC9-ZLE6MZ8XULsms2wm8TmiPSxA34Ak",
            authDomain: "formula-game-f3d82.firebaseapp.com",
            projectId: "formula-game-f3d82",
            storageBucket: "formula-game-f3d82.firebasestorage.app",
            messagingSenderId: "984448778074",
            appId: "1:984448778074:web:cba5b71e137d1ea13dbd63"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, 'tic-tac-toe/v_mobile_final');

        let myName = "";
        let mySymbol = null;
        let board = Array(9).fill("");
        let turn = "X";

        document.getElementById('startBtn').onclick = () => {
            myName = document.getElementById('username').value.trim();
            if(myName) {
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('arena').style.display = 'flex';
                conectar();
            }
        };

        function conectar() {
            onValue(gameRef, (snapshot) => {
                const data = snapshot.val();
                if(!data) {
                    set(gameRef, { board: Array(9).fill(""), turn: "X", pX: myName, pO: "Aguardando..." });
                    mySymbol = "X";
                } else {
                    board = data.board || Array(9).fill("");
                    turn = data.turn;
                    if(!mySymbol) {
                        if(data.pX && (data.pO === "Aguardando..." || !data.pO)) {
                            mySymbol = "O";
                            update(gameRef, { pO: myName });
                        } else { mySymbol = "X"; }
                    }
                    document.getElementById('nameX').innerText = data.pX || "---";
                    document.getElementById('nameO').innerText = data.pO || "---";
                    render();
                }
            });
        }

        function render() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((c, i) => {
                c.innerText = board[i];
                c.className = `cell ${board[i].toLowerCase()}`;
            });

            document.getElementById('cardX').classList.toggle('active', turn === "X");
            document.getElementById('cardO').classList.toggle('active', turn === "O");

            const win = checkWin();
            const status = document.getElementById('statusTxt');
            if(win) {
                status.innerText = win === "Empate" ? "🏁 EMPATE!" : "🏆 VENCEDOR: " + win;
            } else {
                status.innerText = turn === mySymbol ? "⚡ SUA VEZ!" : "⏳ OPONENTE JOGANDO...";
            }
        }

        document.getElementById('board').onclick = (e) => {
            const i = e.target.dataset.i;
            if(i !== undefined && board[i] === "" && turn === mySymbol && !checkWin()) {
                board[i] = mySymbol;
                update(gameRef, { board: board, turn: mySymbol === "X" ? "O" : "X" });
            }
        };

        function checkWin() {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let l of lines) {
                if(board[l[0]] && board[l[0]] === board[l[1]] && board[l[0]] === board[l[2]]) return board[l[0]];
            }
            return board.includes("") ? null : "Empate";
        }

        document.getElementById('reset').onclick = () => {
            set(gameRef, { board: Array(9).fill(""), turn: "X", pX: document.getElementById('nameX').innerText, pO: document.getElementById('nameO').innerText });
        };
    </script>
</body>
</html>
