<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fórmula Game | Arena Final</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-dark: #aa8c2c;
            --dark: #0a0a0a; 
            --glass: rgba(255, 255, 255, 0.03); 
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }

        #lobby { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .card { 
            background: var(--glass); 
            padding: 40px 30px; 
            border-radius: 24px; 
            text-align: center; 
            width: 90%; 
            max-width: 340px; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: var(--shadow);
        }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 25px 0; 
            border-radius: 12px; 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            background: rgba(0,0,0,0.4); 
            color: #fff; 
            text-align: center; 
            font-size: 1rem;
        }

        .btn-3d {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 var(--gold-dark);
            transition: all 0.1s;
            position: relative;
            top: 0;
        }
        .btn-3d:active { top: 3px; box-shadow: 0 1px 0 var(--gold-dark); }

        .arena { display: none; flex-direction: column; width: 100%; max-width: 400px; height: 95vh; justify-content: flex-start; padding: 20px; gap: 20px; }
        
        .header-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            background: var(--glass); 
            padding: 8px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05);
        }

        .p-box { 
            text-align: center; 
            flex: 1; 
            padding: 15px; 
            border-radius: 15px; 
            transition: 0.4s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .p-box.active { 
            background: rgba(212, 175, 55, 0.15); 
            border: 1px solid var(--gold); 
        }
        .p-box div { font-weight: bold; font-size: 1.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .timer-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        #timer-fill {
            width: 100%;
            height: 100%;
            background: #2ecc71;
            border-radius: 10px;
            transition: width 0.1s linear, background 0.5s ease;
        }

        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; aspect-ratio: 1/1; }
        .cell { 
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); 
            border-radius: 18px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2rem; 
            font-weight: 900; 
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3), inset -2px -2px 5px rgba(255,255,255,0.05);
            cursor: pointer;
            transition: transform 0.1s;
            line-height: 0;
            padding: 0;
        }
        .cell:active { transform: scale(0.95); }
        .cell.x { color: var(--gold); text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        .cell.o { color: #fff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); }

        .status { text-align: center; color: var(--gold); font-weight: bold; letter-spacing: 1px; min-height: 20px; }
        
        #newGame { 
            background: transparent; 
            color: var(--gold); 
            border: 1px solid var(--gold); 
            padding: 12px 25px; 
            border-radius: 50px; 
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            align-self: center;
            margin-top: auto;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        #newGame:hover { background: rgba(212, 175, 55, 0.1); transform: translateY(-2px); }
        #newGame:active { transform: translateY(0px); }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="card">
            <h1 style="color:var(--gold); margin-bottom: 5px;">FÓRMULA</h1>
            <p style="font-size: 0.8rem; letter-spacing: 3px; opacity: 0.7;">ARENA MULTIPLAYER</p>
            <input type="text" id="username" placeholder="Seu Nome">
            <button class="btn-3d" id="startBtn">ENTRAR NA ARENA</button>
        </div>
    </div>

    <div class="arena" id="arena">
        <div class="header-container">
            <div class="header">
                <div id="cardX" class="p-box"><div id="nameX">---</div></div>
                <div style="align-self:center; color:var(--gold); font-weight: 900; margin: 0 15px;">VS</div>
                <div id="cardO" class="p-box"><div id="nameO">---</div></div>
            </div>
            <div class="timer-bar-bg">
                <div id="timer-fill"></div>
            </div>
        </div>
        
        <div id="statusTxt" class="status">Conectando...</div>

        <div class="board" id="board">
            <div class="cell" data-i="0"></div><div class="cell" data-i="1"></div><div class="cell" data-i="2"></div>
            <div class="cell" data-i="3"></div><div class="cell" data-i="4"></div><div class="cell" data-i="5"></div>
            <div class="cell" data-i="6"></div><div class="cell" data-i="7"></div><div class="cell" data-i="8"></div>
        </div>

        <button id="newGame">Novo Jogo</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        const firebaseConfig = {
            apiKey: "AIzaSyAmC9-ZLE6MZ8XULsms2wm8TmiPSxA34Ak",
            authDomain: "formula-game-f3d82.firebaseapp.com",
            projectId: "formula-game-f3d82",
            storageBucket: "formula-game-f3d82.firebasestorage.app",
            messagingSenderId: "984448778074",
            appId: "1:984448778074:web:cba5b71e137d1ea13dbd63"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, 'partida_multiplayer/v1');

        let myName = "";
        let mySymbol = null;
        let board = Array(9).fill("");
        let turn = "X";
        let timerInterval = null;
        const TURN_TIME = 15;

        document.getElementById('startBtn').onclick = () => {
            myName = document.getElementById('username').value.trim();
            if(myName) {
                playSound(600, 'sine');
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('arena').style.display = 'flex';
                conectar();
            }
        };

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            let timeLeft = TURN_TIME;
            const bar = document.getElementById('timer-fill');
            
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                const percent = (timeLeft / TURN_TIME) * 100;
                bar.style.width = Math.max(0, percent) + "%";

                if (percent > 50) bar.style.background = "#2ecc71";
                else if (percent > 20) bar.style.background = "#f1c40f";
                else bar.style.background = "#e74c3c";

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    bar.style.width = "0%";
                }
            }, 100);
        }

        function conectar() {
            onValue(gameRef, (snap) => {
                const data = snap.val();
                if (!data) {
                    set(gameRef, { board: Array(9).fill(""), turn: "X", pX: myName, pO: "" });
                    mySymbol = "X";
                } else {
                    const oldTurn = turn;
                    const oldBoard = [...board];
                    board = data.board || Array(9).fill("");
                    turn = data.turn;

                    // Reinicia timer se o turno mudou ou se o tabuleiro foi limpo (novo jogo)
                    const boardCleared = oldBoard.some(cell => cell !== "") && board.every(cell => cell === "");
                    if (oldTurn !== turn || boardCleared || !timerInterval) {
                        startTimer();
                    }

                    if (!mySymbol) {
                        if (data.pX === myName) mySymbol = "X";
                        else if (!data.pO || data.pO === "") { mySymbol = "O"; update(gameRef, { pO: myName }); }
                        else if (data.pO === myName) mySymbol = "O";
                        else mySymbol = "X";
                    }
                    document.getElementById('nameX').innerText = data.pX || "---";
                    document.getElementById('nameO').innerText = (data.pO && data.pO !== "") ? data.pO : "---";
                    atualizarTela();
                }
            });
        }

        function atualizarTela() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((c, i) => {
                if(c.innerText !== board[i] && board[i] !== "") playSound(board[i] === 'X' ? 400 : 500, 'triangle');
                c.innerText = board[i];
                c.className = `cell ${board[i].toLowerCase()}`;
            });
            document.getElementById('cardX').classList.toggle('active', turn === "X");
            document.getElementById('cardO').classList.toggle('active', turn === "O");
            
            const vitoria = conferirVitoria();
            const st = document.getElementById('statusTxt');
            if(vitoria) {
                st.innerText = vitoria === "Empate" ? "EMPATE!" : "VENCEDOR: " + vitoria;
                if(vitoria !== "Empate") playSound(800, 'sine');
                if(timerInterval) clearInterval(timerInterval);
            } else {
                st.innerText = turn === mySymbol ? "SUA VEZ (" + mySymbol + ")" : "TURNO DO OPONENTE";
            }
        }

        document.getElementById('board').onclick = (e) => {
            const i = e.target.dataset.i;
            if(i !== undefined && board[i] === "" && turn === mySymbol && !conferirVitoria()) {
                board[i] = mySymbol;
                update(gameRef, { board: board, turn: mySymbol === "X" ? "O" : "X" });
            }
        };

        function conferirVitoria() {
            const caminhos = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let c of caminhos) { if(board[c[0]] && board[c[0]] === board[c[1]] && board[c[0]] === board[c[2]]) return board[c[0]]; }
            return board.includes("") ? null : "Empate";
        }

        // FUNÇÃO NOVO JOGO: Apenas limpa o banco e o timer, sem recarregar
        document.getElementById('newGame').onclick = () => {
            playSound(300, 'sine');
            update(gameRef, { 
                board: Array(9).fill(""), 
                turn: "X" 
            });
        };
    </script>
</body>
</html>
