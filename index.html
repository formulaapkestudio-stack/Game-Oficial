<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fórmula Game | Arena Final</title>
    <style>
        :root { --gold: #d4af37; --dark: #050505; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        #lobby { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .card { background: var(--glass); padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 320px; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 1px solid var(--gold); background: #000; color: #fff; text-align: center; }
        
        .arena { display: none; flex-direction: column; width: 100%; max-width: 400px; height: 90vh; justify-content: space-between; padding: 20px; }
        .header { display: flex; justify-content: space-between; background: var(--glass); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .p-box { text-align: center; flex: 1; padding: 5px; border-radius: 10px; }
        .p-box.active { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--gold); }
        
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; aspect-ratio: 1/1; }
        .cell { background: var(--glass); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }
        .cell.x { color: var(--gold); }
        .cell.o { color: #fff; }
        
        .status { text-align: center; color: var(--gold); font-weight: bold; }
        .btn { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="card">
            <h2 style="color:var(--gold)">FÓRMULA GAME</h2>
            <input type="text" id="username" placeholder="Seu Nome">
            <button class="btn" id="startBtn">ENTRAR NA ARENA</button>
        </div>
    </div>

    <div class="arena" id="arena">
        <div class="header">
            <div id="cardX" class="p-box"><small>PLAYER X</small><div id="nameX">---</div></div>
            <div style="align-self:center; color:var(--gold)">VS</div>
            <div id="cardO" class="p-box"><small>PLAYER O</small><div id="nameO">---</div></div>
        </div>
        <div id="statusTxt" class="status">Conectando...</div>
        <div class="board" id="board">
            <div class="cell" data-i="0"></div><div class="cell" data-i="1"></div><div class="cell" data-i="2"></div>
            <div class="cell" data-i="3"></div><div class="cell" data-i="4"></div><div class="cell" data-i="5"></div>
            <div class="cell" data-i="6"></div><div class="cell" data-i="7"></div><div class="cell" data-i="8"></div>
        </div>
        <button id="reset" style="background:transparent; color:var(--gold); border:1px solid var(--gold); padding:5px; border-radius:10px;">Resetar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmC9-ZLE6MZ8XULsms2wm8TmiPSxA34Ak",
            authDomain: "formula-game-f3d82.firebaseapp.com",
            projectId: "formula-game-f3d82",
            storageBucket: "formula-game-f3d82.firebasestorage.app",
            messagingSenderId: "984448778074",
            appId: "1:984448778074:web:cba5b71e137d1ea13dbd63"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, 'partida_multiplayer/v1');

        let myName = "";
        let mySymbol = null;
        let board = Array(9).fill("");
        let turn = "X";

        document.getElementById('startBtn').onclick = () => {
            myName = document.getElementById('username').value.trim();
            if(myName) {
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('arena').style.display = 'flex';
                conectar();
            }
        };

        function conectar() {
            onValue(gameRef, (snap) => {
                const data = snap.val();
                if (!data) {
                    set(gameRef, { board: Array(9).fill(""), turn: "X", pX: myName, pO: "Aguardando..." });
                    mySymbol = "X";
                } else {
                    board = data.board || Array(9).fill("");
                    turn = data.turn;
                    
                    // Lógica de Atribuição de Símbolo
                    if (!mySymbol) {
                        if (data.pX === myName) {
                            mySymbol = "X";
                        } else if (data.pO === "Aguardando..." || !data.pO) {
                            mySymbol = "O";
                            update(gameRef, { pO: myName });
                        } else if (data.pO === myName) {
                            mySymbol = "O";
                        } else {
                            // Se já houver dois jogadores diferentes de você
                            alert("A arena está cheia! Você entrará como espectador (X).");
                            mySymbol = "X"; 
                        }
                    }

                    document.getElementById('nameX').innerText = data.pX || "---";
                    document.getElementById('nameO').innerText = data.pO || "---";
                    atualizarTela();
                }
            });
        }

        function atualizarTela() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((c, i) => {
                c.innerText = board[i];
                c.className = `cell ${board[i].toLowerCase()}`;
            });

            document.getElementById('cardX').classList.toggle('active', turn === "X");
            document.getElementById('cardO').classList.toggle('active', turn === "O");

            const vitoria = conferirVitoria();
            const st = document.getElementById('statusTxt');
            if(vitoria) {
                st.innerText = vitoria === "Empate" ? "EMPATE!" : "VENCEDOR: " + vitoria;
            } else {
                st.innerText = turn === mySymbol ? "SUA VEZ (" + mySymbol + ")" : "AGUARDE O OPONENTE...";
            }
        }

        document.getElementById('board').onclick = (e) => {
            const i = e.target.dataset.i;
            if(i !== undefined && board[i] === "" && turn === mySymbol && !conferirVitoria()) {
                board[i] = mySymbol;
                update(gameRef, { board: board, turn: mySymbol === "X" ? "O" : "X" });
            }
        };

        function conferirVitoria() {
            const caminhos = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let c of caminhos) {
                if(board[c[0]] && board[c[0]] === board[c[1]] && board[c[0]] === board[c[2]]) return board[c[0]];
            }
            return board.includes("") ? null : "Empate";
        }

        document.getElementById('reset').onclick = () => {
            set(gameRef, { board: Array(9).fill(""), turn: "X", pX: document.getElementById('nameX').innerText, pO: "Aguardando..." });
            location.reload(); // Recarrega para limpar as variáveis locais
        };
    </script>
</body>
</html>
